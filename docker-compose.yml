services:
  app:
    build: .
    volumes:
      - ./src:/var/www:cached
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: shop_db
      POSTGRES_USER: shop_user
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  node:
    image: node:20-alpine
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    command: sh -c "npm install && npm run build"

volumes:
  pgdata: